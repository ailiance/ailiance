name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # The private submodule ailiance/iact-bench is cloned with the default
        # GITHUB_TOKEN: that repo grants Actions access to the org (its
        # Settings → Actions → Access = organization), so no PAT/secret is
        # needed. Mandatory init — fails loudly if that access is revoked.
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run logic test suite
        run: pytest -m "not network and not e2e" -q
