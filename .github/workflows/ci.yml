name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # The vendored/iact-bench submodule is private (its GitHub repo is
        # not publicly reachable as of #26), so a plain checkout cannot
        # clone it without a token. The logic suite does not require it —
        # the only test that needs it (test_iact_bench_validator.py) skips
        # cleanly when vendored/iact-bench is absent. We therefore allow
        # the submodule checkout to fail without failing the job. To make
        # it init in CI, grant a PAT/deploy-key with read access to the
        # submodule repo and add `token:`/`ssh-key:` below.
        continue-on-error: true
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run logic test suite
        run: pytest -m "not network and not e2e" -q
