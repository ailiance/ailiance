name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Init private iact-bench submodule
        # Main repo checks out above with the default GITHUB_TOKEN. The
        # private submodule (ailiance/iact-bench) is cloned here with
        # IACT_BENCH_PAT — a PAT scoped to ONLY that repo — via a URL
        # rewrite, so the PAT needs no access to this repo. Mandatory: fails
        # loudly if the PAT is missing or loses access (no continue-on-error).
        run: |
          git config --global url."https://x-access-token:${{ secrets.IACT_BENCH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run logic test suite
        run: pytest -m "not network and not e2e" -q
