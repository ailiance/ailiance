name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # The vendored/iact-bench submodule is private (ailiance/iact-bench);
        # cloned via the IACT_BENCH_PAT repo secret (PAT with read access to
        # that repo). Submodule init is mandatory — if the PAT is missing or
        # loses access, the checkout fails loudly rather than silently
        # skipping test_iact_bench_validator.py.
        with:
          submodules: recursive
          token: ${{ secrets.IACT_BENCH_PAT || github.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run logic test suite
        run: pytest -m "not network and not e2e" -q
