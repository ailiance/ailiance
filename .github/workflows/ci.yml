name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # The vendored/iact-bench submodule is private (ailiance/iact-bench).
        # Set a repo secret IACT_BENCH_PAT (a PAT with read access to that
        # repo) to clone it in CI. Absent the secret, the `|| github.token`
        # fallback keeps the MAIN-repo checkout working; only the submodule
        # clone fails, harmlessly — the one test needing it
        # (test_iact_bench_validator.py) skips when vendored/iact-bench is
        # absent. Once IACT_BENCH_PAT is set, drop `continue-on-error` to
        # make the submodule init mandatory.
        continue-on-error: true
        with:
          submodules: recursive
          token: ${{ secrets.IACT_BENCH_PAT || github.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run logic test suite
        run: pytest -m "not network and not e2e" -q
