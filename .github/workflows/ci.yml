name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # Main repo only, via the default GITHUB_TOKEN (always works — never
        # coupled to any PAT).
      - name: Init private iact-bench submodule
        # ailiance/iact-bench is a private CROSS-repo submodule; the default
        # GITHUB_TOKEN cannot read it. Clone it with the IACT_BENCH_PAT secret
        # (a fine-grained PAT scoped to that repo) via a URL rewrite. The PAT
        # MUST be the git username (https://<token>@github.com) — the
        # x-access-token:<token> form is rejected for fine-grained PATs.
        # Mandatory: fails the build if the PAT is missing or loses access.
        run: |
          git config --global url."https://${{ secrets.IACT_BENCH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run logic test suite
        run: pytest -m "not network and not e2e" -q
