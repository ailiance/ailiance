# ailiance router v0.3 / v0.4 — domain → chain policy map.
#
# Keys MUST be a subset of the labels the trained classifier emits —
# see the `output/router-prod/meta.json` "domains" array (47 domains
# today). This file binds a chain policy to 32 of those labels; any
# classifier label not listed here falls through to `_default`
# (direct dispatch, no validation). Run
# `tests/router/test_meta_chain_policies_in_sync.py` to lock that
# invariant in CI.
#
# Each entry binds a classifier domain to one of:
#   - direct:     1-shot, no validator (current behaviour).
#   - validate:   run validator once, surface result.
#   - deliberate: run validator; on failure, retry with reflector
#                 prompt + stderr feedback, up to ``max_retries`` times.
#   - mixture:    fan-out + judge aggregator. v0.3.1 — falls back to
#                 direct in v0.3.0.
#   - sequential: planner + solver + aggregator chain (v0.4).
#
# Tools reference validator names registered in
# vendored/iact-bench/configs/domain_validators.yaml. Only 14 of the
# 32 mapped domains have a deterministic sandbox validator today; the
# rest are `direct` until iact-bench adds them (tracked there as
# `judge-only`).
#
# 2026-05-12 rewrite: previous version used iact-bench domain_metrics
# names (`spice-sim`, `emc-dsp-power`, `math-gsm8k`, `math-reasoning`,
# `llm-orch-seq`, `security-fenrir`, `docker-devops`, `multilingual-eu`)
# which the classifier never emits, so every routed request fell
# through `_default` and never engaged any chain. Realigned to the
# router-prod labels of record while preserving the v0.4 sequential
# policy entries against their classifier-emitted names (`reasoning`,
# `llm-orch`).

policies:
  # ------------------------------------------------------------------
  # Deliberate — validator with retry budget. Compilation / DRC tools.
  # ------------------------------------------------------------------
  cpp:              { policy: deliberate, tool: compile-cpp,         max_retries: 2 }
  embedded:         { policy: deliberate, tool: compile-arm-gcc,     max_retries: 2 }
  freecad:          { policy: deliberate, tool: freecad-script,      max_retries: 1 }
  kicad-dsl:        { policy: deliberate, tool: atopile-build,       max_retries: 2 }
  kicad-pcb:        { policy: deliberate, tool: kicad-drc,           max_retries: 2 }
  platformio:       { policy: deliberate, tool: compile-platformio,  max_retries: 2 }
  shell:            { policy: deliberate, tool: compile-shell,       max_retries: 1 }
  spice:            { policy: deliberate, tool: ngspice-converge,    max_retries: 2 }
  typescript:       { policy: deliberate, tool: compile-typescript,  max_retries: 1 }

  # ------------------------------------------------------------------
  # Validate — surface lint / parse result, no retry.
  # ------------------------------------------------------------------
  html-css:         { policy: validate, tool: parse-html-css }
  sql:              { policy: validate, tool: parse-sql }
  yaml-json:        { policy: validate, tool: compile-yaml-json }

  # ------------------------------------------------------------------
  # Mixture — cross-judge ensemble. Falls back to direct in v0.3.0;
  # active in v0.3.1.
  # ------------------------------------------------------------------
  chat-fr:          { policy: mixture, workers: [ailiance-mistral, ailiance-gemma4],
                      judge: ailiance-mistral }
  security:         { policy: mixture, workers: [ailiance-mistral, ailiance-qwen],
                      judge: ailiance-mistral }

  # ------------------------------------------------------------------
  # Sequential — planner + solver + aggregator chain (v0.4).
  # PR #75 originally keyed these under `math-reasoning` / `llm-orch-seq`
  # which the router-prod classifier never emits; the classifier-emitted
  # names are `reasoning` (replaced math-reasoning) and `llm-orch`.
  # ------------------------------------------------------------------
  reasoning:        { policy: sequential,
                      planner: ailiance-reasoning-r1,
                      solver: ailiance-coder-pro,
                      aggregator: ailiance-mistral,
                      max_steps: 5 }
  llm-orch:         { policy: sequential,
                      planner: ailiance-mistral,
                      solver: ailiance-coder-pro,
                      aggregator: ailiance-mistral,
                      max_steps: 5 }

  # ------------------------------------------------------------------
  # Direct — no deterministic validator, no expected cross-judge lift.
  # iact-bench may promote some of these to `deliberate` in a later
  # release (cargo check for rust, luac for lua-upy, pyflakes/mypy for
  # python in-proc execute). Until then, direct dispatch.
  # ------------------------------------------------------------------
  calcul-normatif:  { policy: direct }
  devops:           { policy: direct }
  docker:           { policy: direct }
  dsp:              { policy: direct }
  electronics:      { policy: direct }
  iot:              { policy: direct }
  lua-upy:          { policy: direct }
  math:             { policy: direct }
  ml-training:      { policy: direct }
  music-audio:      { policy: direct }
  power:            { policy: direct }
  python:           { policy: direct }   # in-proc compile-only; pass-rate-execute deferred
  rust:             { policy: direct }   # cargo check pending in iact-bench
  stm32:            { policy: direct }
  web-backend:      { policy: direct }
  web-frontend:     { policy: direct }

  # ------------------------------------------------------------------
  # Wildcard — any unmapped or alias-normalised classifier output.
  # ------------------------------------------------------------------
  _default:         { policy: direct }
