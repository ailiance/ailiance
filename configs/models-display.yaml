# Display metadata for /v1/models/details endpoint.
# OpenAI-standard /v1/models stays minimal (id + object + owned_by);
# clients (UIs, aki) that want richer info hit /v1/models/details.
# Edit freely — gateway re-reads this file on each request (no restart).

models:
  ailiance:
    display_name: "Auto-router"
    base_model: "MiniLM L6 v2 + 2-layer MLP"
    domain: "router"
    description: >-
      Domain router classifies your prompt over 40 domains and forwards
      to the best worker (Mistral-Medium 128B / Qwen3-Next 80B /
      Granite 30B / EuroLLM 22B / mascarade-* / Gemma 3 4B). Decision
      exposed via /v1/route.
    headline: "MiniLM 384d · 40 domains · top1≈65% top3≈86%"

  ailiance-mistral-medium:
    display_name: "Mistral-Medium 3.5 128B Q8"
    base_model: "Mistral-Medium 3.5 128B (Mistral AI)"
    domain: "general / heavy reasoning"
    description: >-
      Mistral-Medium 3.5 128B MLX Q8 — served by launchd plist
      cc.ailiance.mistral.plist on Mac Studio M3 Ultra (studio:9301).
      Replaces the prior Apertus 70B alias (Apertus present on disk
      but used only via mlx_lm.evaluate, never served).
    headline: "128B params · MLX Q8 · Mac Studio M3 Ultra"

  ailiance-mistral:
    display_name: "Mistral-Medium 3.5 128B Q8 (alias)"
    base_model: "Mistral-Medium 3.5 128B (Mistral AI)"
    domain: "general / heavy reasoning"
    description: >-
      Alias of ailiance-mistral-medium. Same Mistral-Medium 3.5 128B
      MLX Q8 backend on studio:9301.
    headline: "alias → ailiance-mistral-medium"

  ailiance-eurollm:
    display_name: "EuroLLM 22B"
    base_model: "EuroLLM 22B Instruct (utter-project)"
    domain: "multilingual"
    description: >-
      EuroLLM 22B — multilingual EU coverage (24 official EU languages).
      MLX 8-bit · ~22 GB · runs on Mac Studio M3 Ultra (studio:9303).
      Currently DOWN (2026-05-11) — launchctl bootstrap requires GUI
      session, restart manually.
    headline: "22B params · MLX 8-bit · Mac Studio M3 Ultra"

  ailiance-qwen:
    display_name: "Qwen3-Next 80B-A3B Instruct"
    base_model: "Qwen3-Next 80B-A3B Instruct (MoE 256 experts, ~3B active)"
    domain: "reasoning"
    description: >-
      Qwen3-Next 80B-A3B Instruct Q4_K_M GGUF — MoE reasoning model
      (~79.67B params, ~3B active). 262k context. ~48.4 GB · llama.cpp
      on KXKM-AI server (RTX 4090 + 64 GB RAM, partial GPU offload)
      via autossh tunnel electron-server:8002 → kxkm-ai:18888.
    headline: "80B MoE / ~3B active · Q4_K_M GGUF · 262k ctx · KXKM-AI"

  ailiance-granite:
    display_name: "Granite 4.1 30B"
    base_model: "IBM Granite 4.1 30B"
    domain: "general / code"
    description: >-
      IBM Granite 4.1 30B Q4_K_M GGUF — general + code (~28.87B params,
      131k context). ~17.5 GB · llama.cpp on KXKM-AI (RTX 4090) via
      autossh tunnel electron-server:8003 → kxkm-ai:18889.
    headline: "30B params · Q4_K_M GGUF · 131k ctx · KXKM-AI"

  ailiance-gemma:
    display_name: "Gemma 3 4B IT"
    base_model: "Google Gemma 3 4B Instruction-Tuned"
    domain: "quick / fallback"
    description: >-
