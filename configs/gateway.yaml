# configs/gateway.yaml
router:
  weights_dir: output/router
  embedding_model: jinaai/jina-embeddings-v3
  embedding_dim: 1024
  hidden_dim: 512
  num_domains: 40
  threshold: 0.12
  max_active: 4

workers:
  apertus:
    url: http://localhost:9301
    port: 9301
  devstral:
    url: http://localhost:9302
    port: 9302
  eurollm:
    url: http://localhost:9303
    port: 9303
