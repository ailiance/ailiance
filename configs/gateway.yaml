# configs/gateway.yaml
router:
  weights_dir: output/router-v6
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  hidden_dim: 256
  num_domains: 32
  threshold: 0.50
  max_active: 4

workers:
  apertus:
    url: http://localhost:9301
    port: 9301
  devstral:
    url: http://localhost:9302
    port: 9302
  eurollm:
    url: http://localhost:9303
    port: 9303
